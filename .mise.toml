redactions = ["PURELYMAIL_API_TOKEN"]

[env]
_.path = "{{ env.PATH }}:{{ config_root }}/bin"
_.python.venv = { path = ".venv", create = true }

[task_config]
dir = "{{ config_root }}"
includes = [".config/tasks.mise.toml"]

[tools]
actionlint = "1.7.12"
jq = "1.8.1"
python = "3.14.6"
typos = "1.47.2"
uv = "0.11.21"
zizmor = "1.25.2"

[plugins]
zizmor = "asdf:vic1707/asdf-zizmor"

[hooks] # <https://github.com/jdx/mise-action/issues/295>
postinstall = "uv sync"

[settings.python]
compile = false     ## Forces download of precompiled bin
uv_venv_auto = true

[settings]
experimental = true # needed for uv venv hook
