---
- name: Import integration_config.yml
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/integration_config.yml"

- name: List users
  bofzilla.purelymail.crud.user.list_users:
    api_token: "{{ PURELYMAIL_API_TOKEN }}"
  register: result
  environment:
    PURELYMAIL_API_TLS_VERIFY: "{{ PURELYMAIL_API_TLS_VERIFY }}"

- name: Debug result
  ansible.builtin.debug:
    var: result

- name: Assert module returns users
  ansible.builtin.assert:
    that:
      - result is not failed
      - result.changed == false
      - result.users is defined
      - result.users | length >= 0
